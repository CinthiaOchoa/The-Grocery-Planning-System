<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meal Planner - Add Recipe Ingredient</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/forms.css">

  <style>
    .form-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .message-box {
      margin-top: 16px;
    }

    @media (max-width: 900px) {
      .form-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="brand">
      <h1>Meal Planner</h1>
      <p>Healthy meals and smart grocery planning.</p>
    </div>

    <div>
      <div class="nav-title">Main Menu</div>
      <nav class="nav-links">
        <a class="nav-link" href="dashboard.html">🏠 Dashboard</a>
        <a class="nav-link" href="pantry-list.html">🥫 Pantry</a>
        <a class="nav-link" href="ingredients-dataset.html">🥬 Ingredients</a>
        <a class="nav-link active" href="recipes-list.html">🍲 Recipes</a>
        <a class="nav-link" href="stores-list.html">🛒 Stores</a>
        <a class="nav-link" href="profile.html">👤 Profile</a>
        <a class="nav-link" href="settings.html">⚙️ Settings</a>
      </nav>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div>
        <h2>Add Recipe Ingredient</h2>
        <p>Add an ingredient to this recipe.</p>
      </div>
    </header>

    <section class="card">
      <div class="card-header">
        <h3>Recipe Ingredient Information</h3>
      </div>

      <form id="recipeIngredientForm" class="form-layout">
        <div class="form-group">
          <label for="recipe_id">Recipe ID</label>
          <input id="recipe_id" name="recipe_id" class="form-control" type="text" readonly />
        </div>
        <div class="form-group">
          <label for="ingredient_select">Ingredient</label>
          <select
            id="ingredient_select"
            name="ingredient_select"
            class="form-control"
            required
          >
            <option value="">Select ingredient</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="ingredient_id">Ingredient ID</label>
          <input
            id="ingredient_id"
            name="ingredient_id"
            class="form-control"
            type="text"
            placeholder="Auto-filled"
            readonly
          />
        </div>

        <div class="form-group">
          <label for="amount">Amount</label>
          <input
            id="amount"
            name="amount"
            class="form-control"
            type="number"
            min="0"
            step="0.01"
            placeholder="Enter amount"
            required
          />
        </div>

        <div class="form-group">
          <label for="unit">Unit</label>
          <input
            id="unit"
            name="unit"
            class="form-control"
            type="text"
            placeholder="e.g. g, cups, tbsp, pieces"
            required
          />
        </div>

        <div class="form-group full">
          <div class="form-actions">
            <button type="submit" class="btn-primary">Save Recipe Ingredient</button>
            <button type="reset" class="btn-secondary">Clear Form</button>
            <a id="goBackBtn" href="recipes-list.html" class="btn-secondary">Go Back</a>
          </div>
        </div>
      </form>

      <div id="recipeIngredientMessage" class="message-box"></div>
    </section>
  </main>
</div>
<script>
  const savedTheme = localStorage.getItem("themePreference") || "light";
  document.body.dataset.theme = savedTheme;
</script>
<script type="module" src="../js/new-recipe-ingredient.js"></script>
</body>
</html>
