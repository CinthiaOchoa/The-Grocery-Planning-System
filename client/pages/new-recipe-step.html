<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal Planner - New Recipe Step</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/forms.css">
  <link rel="stylesheet" href="../css/tables.css">

  <style>
    .form-card {
      max-width: 850px;
    }

    .page-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .message-box {
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <h1>Meal Planner</h1>
        <p>Healthy meals, pantry tracking, recipes, and budget management for students.</p>
      </div>

      <div>
        <div class="nav-title">Main Menu</div>
        <nav class="nav-links">
          <a class="nav-link" href="dashboard.html">🏠 Dashboard</a>
          <a class="nav-link" href="pantry-list.html">🥫 Pantry</a>
          <a class="nav-link" href="ingredients-dataset.html">🥬 Ingredients</a>
          <a class="nav-link active" href="recipes-list.html">🍲 Recipes</a>
          <a class="nav-link" href="stores-list.html">🛒 Stores</a>
          <a class="nav-link" href="profile.html">👤 Profile</a>
          <a class="nav-link" href="settings.html">⚙️ Settings</a>
          <a class="nav-link" href="login.html">↩ Sign Out</a>
        </nav>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h2>New Recipe Step</h2>
          <p>Add a new step for the selected recipe.</p>
        </div>
      </header>

      <div class="page-actions">
        <a id="goBackBtn" href="recipes-list.html" class="btn-secondary">← Go Back</a>
      </div>

      <section class="card form-card">
        <div class="card-header">
          <h3>Add Recipe Step</h3>
        </div>

        <form id="recipeStepForm" class="form-grid">
          <div class="form-group">
            <label for="recipe_id">Recipe ID</label>
            <input id="recipe_id" name="recipe_id" class="form-control" type="text" readonly />
          </div>

          <div class="form-group">
            <label for="step_number">Step Number</label>
            <input id="step_number" name="step_number" class="form-control" type="number" min="1" required />
          </div>

          <div class="form-group full">
            <label for="description">Step Description</label>
            <textarea
              id="description"
              name="description"
              class="form-control"
              rows="6"
              placeholder="Write the full cooking instruction for this step"
              required
            ></textarea>
          </div>

          <div class="form-group full" style="display:flex; gap:12px; flex-wrap:wrap;">
            <button type="submit" class="btn-primary">Save Recipe Step</button>
            <button type="reset" class="btn-secondary">Clear Form</button>
          </div>
        </form>

        <div id="formMessage" class="message-box"></div>
      </section>
    </main>
  </div>
  <script>
    const savedTheme = localStorage.getItem("themePreference") || "light";
    document.body.dataset.theme = savedTheme;
  </script>
  <script type="module" src="../js/new-recipe-step.js"></script>
</body>
</html>
