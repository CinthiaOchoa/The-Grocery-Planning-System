<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meal Planner - Add Recipe</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/forms.css">

  <style>
    /* UNIQUE TO NEW RECIPE */

    .form-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .note-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      background: #fff8ef;
      border-left: 4px solid var(--sand);
      font-size: 0.92rem;
      color: var(--text-soft);
    }

    @media (max-width: 900px) {
      .form-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <h1>Meal Planner</h1>
      <p>Healthy meals and smart grocery planning.</p>
    </div>

    <div>
      <div class="nav-title">Main Menu</div>
      <nav class="nav-links">
        <a class="nav-link" href="dashboard.html">🏠 Dashboard</a>
        <a class="nav-link" href="pantry-list.html">🥫 Pantry</a>
        <a class="nav-link" href="ingredients-dataset.html">🥬 Ingredients</a>
        <a class="nav-link active" href="recipes-list.html">🍲 Recipes</a>
        <a class="nav-link" href="stores-list.html">🛒 Stores</a>
        <a class="nav-link" href="profile.html">👤 Profile</a>
        <a class="nav-link" href="settings.html">⚙️ Settings</a>
      </nav>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <header class="topbar">
      <div>
        <h2>Add New Recipe</h2>
        <p>Create a recipe that will later connect to ingredients and steps.</p>
      </div>
    </header>

    <!-- FORM -->
    <section class="card">
      <div class="card-header">
        <h3>Recipe Information</h3>
      </div>

      <form id="recipeForm" class="form-layout">

        <div class="form-group">
          <label for="recipe_id">Recipe ID</label>
          <input id="recipe_id" name="recipe_id" class="form-control" type="text" placeholder="Enter recipe ID" />
        </div>

        <div class="form-group">
          <label for="name">Recipe Name</label>
          <input id="name" name="name" class="form-control" type="text" placeholder="Enter recipe name" />
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <input id="category" name="category" class="form-control" type="text" placeholder="e.g. Breakfast, Lunch" />
        </div>

        <div class="form-group">
          <label for="difficulty">Difficulty</label>
          <select id="difficulty" name="difficulty" class="form-control">
            <option value="">Select difficulty</option>
            <option>Easy</option>
            <option>Medium</option>
            <option>Hard</option>
          </select>
        </div>

        <div class="form-group">
          <label for="prep_time">Prep Time (minutes)</label>
          <input id="prep_time" name="prep_time" class="form-control" type="number" placeholder="Enter prep time" />
        </div>

        <div class="form-group">
          <label for="cook_time">Cook Time (minutes)</label>
          <input id="cook_time" name="cook_time" class="form-control" type="number" placeholder="Enter cook time" />
        </div>

        <div class="form-group full">
          <label for="description">Description</label>
          <textarea id="description" name="description" class="form-control" placeholder="Write a short description of the recipe"></textarea>
        </div>

        <div class="form-group full">
          <button type="button" class="btn-primary">Save Recipe</button>
          <button type="reset" class="btn-secondary">Clear Form</button>
          <a href="recipes-list.html" class="btn-secondary">Go Back</a>
        </div>

      </form>

    </section>

  </main>
</div>
</body>
</html>
