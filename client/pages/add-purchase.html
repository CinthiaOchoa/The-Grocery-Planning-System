<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal Planner - Add Purchase</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/forms.css">
  <link rel="stylesheet" href="../css/tables.css">

  <style>
    .page-grid {
      grid-template-columns: 1.1fr 0.9fr;
    }

    .hero-box {
      background: linear-gradient(135deg, rgba(4,79,95,0.96) 0%, rgba(22,94,110,0.95) 100%);
    }

    .info-list {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .info-item {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .info-item strong {
      display: block;
      margin-bottom: 4px;
      color: var(--sand);
    }

    .info-item span {
      color: rgba(255,255,255,0.86);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .csv-ready-note {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      background: #fff8ef;
      border: 1px solid #efd8b9;
      color: var(--text-soft);
      line-height: 1.55;
      font-size: 0.92rem;
    }

    .preview-panel {
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      border-radius: 18px;
      background: var(--bg-soft);
      border: 1px dashed #e0cba9;
      color: var(--text-soft);
      line-height: 1.6;
    }

    .preview-panel strong {
      color: var(--dark-red);
    }

    .future-preview-grid {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .future-preview-item {
      padding: 14px 16px;
      border-radius: 16px;
      background: #fffdfa;
      border: 1px solid #f0e2d2;
    }

    .future-preview-item strong {
      display: block;
      color: var(--deep-teal);
      margin-bottom: 4px;
      font-size: 0.95rem;
    }

    .future-preview-item span {
      color: var(--text-soft);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .helper-message {
      margin-top: 14px;
      font-size: 0.95rem;
      color: var(--text-soft);
    }

    @media (max-width: 1150px) {
      .page-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <h1>Meal Planner</h1>
        <p>Healthy meals, pantry tracking, recipes, and budget management for students.</p>
      </div>

      <div>
        <div class="nav-title">Main Menu</div>
        <nav class="nav-links">
          <a class="nav-link" href="dashboard.html"><span class="nav-badge">🏠</span> Dashboard</a>
          <a class="nav-link" href="pantry-list.html"><span class="nav-badge">🥫</span> Pantry</a>
          <a class="nav-link" href="ingredients-dataset.html"><span class="nav-badge">🥬</span> Ingredients</a>
          <a class="nav-link" href="recipes-list.html"><span class="nav-badge">🍲</span> Recipes</a>
          <a class="nav-link active" href="stores-list.html"><span class="nav-badge">🛒</span> Stores</a>
          <a class="nav-link" href="profile.html"><span class="nav-badge">👤</span> Profile</a>
          <a class="nav-link" href="settings.html"><span class="nav-badge">⚙️</span> Settings</a>
          <a class="nav-link" href="login.html"><span class="nav-badge">↩</span> Sign Out</a>
        </nav>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h2>Add Purchase</h2>
          <p id="purchasePageSubtitle">Add a new purchase record for the selected store.</p>
        </div>

        <div class="profile-pill">
          <div class="avatar">SU</div>
          <div>
            <small>Logged in as</small>
            <strong>Student User</strong>
          </div>
        </div>
      </header>

      <article class="card">
        <div class="card-header">
          <h3>Purchase Form</h3>
        </div>

        <form class="form-grid" id="purchaseForm">
          <div class="form-group">
            <label for="store_id">Store ID</label>
            <input id="store_id" name="store_id" class="form-control" type="text" placeholder="Enter store id" />
          </div>

          <div class="form-group">
            <label for="ingredient_id">Ingredient ID</label>
            <input id="ingredient_id" name="ingredient_id" class="form-control" type="text" placeholder="Enter ingredient id" />
          </div>

          <div class="form-group">
            <label for="student_id">Student ID</label>
            <input id="student_id" name="student_id" class="form-control" type="text" placeholder="Enter student id" />
          </div>

          <div class="form-group">
            <label for="date">Date</label>
            <input id="date" name="date" class="form-control" type="date" />
          </div>

          <div class="form-group">
            <label for="price">Price</label>
            <input id="price" name="price" class="form-control" type="number" step="0.01" placeholder="Enter price" />
          </div>

          <div class="form-group">
            <label for="quantity">Quantity</label>
            <input id="quantity" name="quantity" class="form-control" type="number" step="0.01" placeholder="Enter quantity" />
          </div>

          <div class="form-group full">
            <label for="unit">Unit</label>
            <input id="unit" name="unit" class="form-control" type="text" placeholder="lb, bag, bottle, box, cup..." />
          </div>

          <div class="form-group full">
            <div class="button-row">
              <button type="submit" class="btn-primary">Save Purchase</button>
              <button type="reset" class="btn-secondary">Clear Form</button>
              <button type="button" id="goBackBtn" class="btn-secondary">Go Back</button>
            </div>
          </div>
        </form>

        <div id="purchaseMessage" class="helper-message"></div>
      </article>
    </main>
  </div>

  <script>
    const PURCHASES_STORAGE_KEY = "purchased_ingredients";

    const form = document.getElementById("purchaseForm");
    const storeIdInput = document.getElementById("store_id");
    const ingredientIdInput = document.getElementById("ingredient_id");
    const studentIdInput = document.getElementById("student_id");
    const dateInput = document.getElementById("date");
    const priceInput = document.getElementById("price");
    const quantityInput = document.getElementById("quantity");
    const unitInput = document.getElementById("unit");
    const messageBox = document.getElementById("purchaseMessage");
    const goBackBtn = document.getElementById("goBackBtn");
    const subtitle = document.getElementById("purchasePageSubtitle");

    const params = new URLSearchParams(window.location.search);
    const selectedStoreId = params.get("store_id") || "";

    if (selectedStoreId) {
      storeIdInput.value = selectedStoreId;
      storeIdInput.readOnly = true;
      subtitle.textContent = `Add a new purchase for Store ID: ${selectedStoreId}`;
    }

    function getSavedPurchases() {
      const raw = localStorage.getItem(PURCHASES_STORAGE_KEY);
      if (!raw) return [];
      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function savePurchases(purchases) {
      localStorage.setItem(PURCHASES_STORAGE_KEY, JSON.stringify(purchases));
    }

    function clearFormKeepStore() {
      form.reset();
      messageBox.textContent = "";
      if (selectedStoreId) {
        storeIdInput.value = selectedStoreId;
        storeIdInput.readOnly = true;
      }
    }

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const purchaseData = {
        store_id: storeIdInput.value.trim(),
        ingredient_id: ingredientIdInput.value.trim(),
        student_id: studentIdInput.value.trim(),
        date: dateInput.value,
        price: priceInput.value,
        quantity: quantityInput.value,
        unit: unitInput.value.trim()
      };

      if (
        !purchaseData.store_id ||
        !purchaseData.ingredient_id ||
        !purchaseData.student_id ||
        !purchaseData.date ||
        !purchaseData.price ||
        !purchaseData.quantity ||
        !purchaseData.unit
      ) {
        messageBox.textContent = "Please complete all fields before saving.";
        return;
      }

      const savedPurchases = getSavedPurchases();
      savedPurchases.push(purchaseData);
      savePurchases(savedPurchases);

      messageBox.textContent = "Purchase saved successfully.";

      setTimeout(() => {
        window.location.href = `store-purchases.html?store_id=${encodeURIComponent(purchaseData.store_id)}`;
      }, 500);
    });

    form.addEventListener("reset", function () {
      setTimeout(() => {
        clearFormKeepStore();
      }, 0);
    });

    goBackBtn.addEventListener("click", function () {
      if (selectedStoreId) {
        window.location.href = `store-purchases.html?store_id=${encodeURIComponent(selectedStoreId)}`;
      } else {
        window.location.href = "store-purchases.html";
      }
    });
  </script>
</body>
</html>
