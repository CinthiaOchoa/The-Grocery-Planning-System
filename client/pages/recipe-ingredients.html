<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meal Planner - Recipe Ingredients</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/forms.css">
  <link rel="stylesheet" href="../css/tables.css">

  <style>
    /* Recipe-ingredients ONLY */

    .recipe-hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .hero-card {
      background: linear-gradient(135deg, rgba(4,79,95,0.96) 0%, rgba(22,94,110,0.95) 100%);
      color: white;
      position: relative;
      overflow: hidden;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      right: -50px;
      bottom: -80px;
      border-radius: 50%;
      background: rgba(237,195,133,0.16);
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .meta-pill {
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.14);
      font-size: 0.88rem;
      font-weight: 700;
    }

    .ingredient-name {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ingredient-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(22,94,110,0.10);
      color: var(--teal);
      font-size: 1.1rem;
    }

    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 1200px) {
      .recipe-hero,
      .bottom-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
