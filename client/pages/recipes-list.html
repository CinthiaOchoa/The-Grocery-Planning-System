<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meal Planner - Recipes</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/tables.css">
  <link rel="stylesheet" href="../css/forms.css">

  <style>
    /* UNIQUE TO RECIPES LIST */

    .recipes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .recipe-card {
      padding: 18px;
      border-radius: 18px;
      background: #fffdfa;
      border: 1px solid #f0e2d2;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: 0.2s;
    }

    .recipe-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 22px rgba(0,0,0,0.08);
    }

    .recipe-title {
      font-weight: 700;
      color: var(--dark-red);
      font-size: 1.05rem;
    }

    .recipe-meta {
      font-size: 0.9rem;
      color: var(--text-soft);
    }

    .recipe-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .recipes-empty {
      text-align: center;
      padding: 40px;
      border-radius: 18px;
      border: 1px dashed #e0cba9;
      background: #fffdfa;
      color: var(--text-soft);
      margin-top: 20px;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-buttons a {
      text-decoration: none;
    }

    .btn-small {
      padding: 8px 12px;
      font-size: 0.85rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      display: inline-block;
      text-align: center;
    }

    .btn-view {
      background-color: #d97706;
      color: white;
    }

    .btn-ingredients {
      background-color: #15803d;
      color: white;
    }

    .btn-steps {
      background-color: #2563eb;
      color: white;
    }

    .btn-small:hover {
      opacity: 0.9;
    }

    @media (max-width: 600px) {
      .recipes-grid {
        grid-template-columns: 1fr;
      }
    }

    .action-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn-small {
    padding: 8px 12px;
    font-size: 0.85rem;
    border-radius: 10px;
    border: none;
    text-decoration: none;
    display: inline-block;
    text-align: center;
    cursor: pointer;
  }

  .btn-ingredients {
    background-color: #15803d;
    color: white;
  }

  .btn-steps {
    background-color: #2563eb;
    color: white;
  }
  </style>
</head>

<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <h1>Meal Planner</h1>
      <p>Healthy meals and smart grocery planning.</p>
    </div>

    <div>
      <div class="nav-title">Main Menu</div>
      <nav class="nav-links">
        <a class="nav-link" href="dashboard.html">🏠 Dashboard</a>
        <a class="nav-link" href="pantry-list.html">🥫 Pantry</a>
        <a class="nav-link" href="ingredients-dataset.html">🥬 Ingredients</a>
        <a class="nav-link active" href="recipes-list.html">🍲 Recipes</a>
        <a class="nav-link" href="stores-list.html">🛒 Stores</a>
        <a class="nav-link" href="profile.html">👤 Profile</a>
        <a class="nav-link" href="settings.html">⚙️ Settings</a>
      </nav>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <!-- HEADER -->
    <header class="topbar">
      <div>
        <h2>Recipes</h2>
        <p>Browse and manage your recipes.</p>
      </div>
      <div class="profile-pill">
        <div class="avatar-small" id="topbar-avatar">SU</div>
        <div>
        <small>Logged in as</small>
        <strong id="topbar-name">Student User</strong>
        </div>
        </div>
    </header>

    <!-- FILTERS -->
    <section class="card">
      <div class="toolbar">
        <input id="recipe-search" class="search-input" type="text" placeholder="Search recipes..." />
        <a href="new-recipe.html" class="btn-primary">+ Add Recipe</a>
      </div>
    </section>

    <!-- RECIPES TABLE -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Recipe ID</th>
            <th>Name</th>
            <th>Type</th>
            <th>Servings</th>
            <th>Total Preparation Time</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="recipesTableBody">
        </tbody>
      </table>
    </div>

    <!-- OPTIONAL GRID SECTION -->
    <section class="recipes-grid" id="recipesContainer">
      <!-- DATA CAN GO HERE LATER IF YOU WANT CARDS TOO -->
    </section>
  </main>
</div>
<script>
  const savedTheme = localStorage.getItem("themePreference") || "light";
  document.body.dataset.theme = savedTheme;
</script>
<script type="module">
  import { loadCurrentStudentUI, requireAuth } from "../js/currentStudent.js";

  requireAuth();
  loadCurrentStudentUI();
</script>
<script type="module" src="../js/recipes.js"></script>
<script type="module">
  import { loadCurrentStudentUI, requireAuth } from "../js/currentStudent.js";

  requireAuth();
  loadCurrentStudentUI();
</script>
</body>
</html>
